<!-- ⭐ QR 라이브러리: davidshimjs/qrcodejs (브라우저용, 사내망 안정) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" onerror="loadQRBackup()"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js" onerror="loadJsQRBackup()"></script>
<script>
function loadQRBackup(){
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js';
  s.onerror=function(){
    var s2=document.createElement('script');
    s2.src='https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js';
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}
function loadJsQRBackup(){
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
  document.head.appendChild(s);
}
</script>

<style>
:root{
  --bg-base:#F9FAFB; --bg-tint:#F4FBF7;
  --ink-900:#0F172A; --ink-700:#334155; --ink-500:#64748B;
  --ink-400:#94A3B8; --ink-300:#CBD5E1; --ink-200:#E2E8F0;
  --line:rgba(15,23,42,0.06); --line-soft:rgba(15,23,42,0.04);
  --em-50:#ECFDF5; --em-100:#D1FAE5; --em-200:#A7F3D0;
  --em-300:#6EE7B7; --em-400:#34D399; --em-500:#10B981;
  --em-600:#059669; --em-700:#047857; --em-800:#065F46; --em-900:#064E3B;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.22,0.61,0.36,1);
}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
html,body,#root{height:100%;}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  letter-spacing:-0.02em; word-break:keep-all; overflow-wrap:break-word;
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(16,185,129,0.06), transparent 60%),
    radial-gradient(1000px 500px at 110% 110%, rgba(5,150,105,0.05), transparent 55%),
    var(--bg-base);
  min-height:100vh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased; color:var(--ink-900);
}
.logo-font{font-family:'Jua',sans-serif;letter-spacing:-0.01em;}
.fw700{font-weight:700;letter-spacing:-0.025em;}
.fw800{font-weight:800;letter-spacing:-0.035em;}
.fw900{font-weight:900;letter-spacing:-0.04em;}
.track-tight{letter-spacing:-0.025em;}
.track-tighter{letter-spacing:-0.035em;}

.card{background:#fff;border:1px solid var(--line-soft);border-radius:24px;
  box-shadow:0 1px 2px rgba(15,23,42,0.025),0 4px 14px rgba(15,23,42,0.035),0 20px 48px rgba(15,23,42,0.04);}
.card-hero{background:linear-gradient(180deg,#FFFFFF 0%, #FAFDFB 100%);
  border:1px solid rgba(16,185,129,0.08);border-radius:28px;
  box-shadow:0 1px 2px rgba(15,23,42,0.025),0 4px 18px rgba(15,23,42,0.04),0 24px 60px rgba(6,95,70,0.06);}

.btn{transition:transform 0.28s var(--spring), filter 0.2s var(--ease-out), box-shadow 0.28s var(--ease-out), background 0.2s var(--ease-out);will-change:transform;}
.btn:hover:not(:disabled){transform:translateY(-1.5px);filter:brightness(1.03);}
.btn:active:not(:disabled){transform:scale(0.965);transition-duration:0.12s;}

.btn-g{background:linear-gradient(135deg,#10B981 0%, #059669 58%, #047857 100%);
  color:#fff;font-weight:700;letter-spacing:-0.02em;
  box-shadow:0 1px 2px rgba(6,95,70,0.2),0 6px 16px rgba(16,185,129,0.28),inset 0 1px 0 rgba(255,255,255,0.2);}
.btn-g:hover:not(:disabled){background:linear-gradient(135deg,#059669 0%, #047857 60%, #065F46 100%);
  box-shadow:0 1px 2px rgba(6,95,70,0.25),0 10px 24px rgba(16,185,129,0.35),inset 0 1px 0 rgba(255,255,255,0.2);}
.btn-g:disabled{background:linear-gradient(135deg,#E2E8F0,#CBD5E1);color:#fff;box-shadow:none;cursor:not-allowed;}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.94) translateY(4px)}60%{transform:scale(1.015) translateY(0);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes scaleIn{0%{opacity:0;transform:scale(.7)}60%{transform:scale(1.03);opacity:1}100%{transform:scale(1)}}
@keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes bounceY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes sproutAnim{0%,100%{transform:translateY(0) rotate(-1deg)}30%{transform:translateY(-8px) rotate(2deg)}60%{transform:translateY(-2px) rotate(-1deg)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes badgeIn{0%{transform:scale(0) translateY(8px);opacity:0}60%{transform:scale(1.1) translateY(-2px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
@keyframes arrowUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.28)}50%{box-shadow:0 0 0 12px rgba(16,185,129,0)}}
@keyframes countPop{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes spin-cw{to{transform:rotate(360deg)}}
@keyframes floatA{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes floatB{0%,100%{transform:translateY(0) rotate(3deg)}50%{transform:translateY(-6px) rotate(-3deg)}}
@keyframes toastIn{0%{opacity:0;transform:translateY(-24px) scale(.94)}60%{transform:translateY(2px) scale(1.01);opacity:1}100%{transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-12px) scale(.96)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-2px)}40%,80%{transform:translateX(2px)}}
@keyframes glowPulse{0%,100%{box-shadow:0 4px 16px rgba(16,185,129,0.32)}50%{box-shadow:0 4px 24px rgba(16,185,129,0.55),0 0 0 4px rgba(16,185,129,0.2)}}
@keyframes giftPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes scanLine{0%{top:0}100%{top:100%}}

.fadeIn{animation:fadeIn .35s var(--ease-out) forwards}
.slideUp{animation:slideUp .42s var(--spring) forwards}
.popIn{animation:popIn .38s var(--spring) forwards}
.scaleIn{animation:scaleIn .48s var(--spring) forwards}
.wiggle{animation:wiggle 3s ease-in-out infinite;display:inline-block}
.bounceY{animation:bounceY 2s ease-in-out infinite;display:inline-block}
.sprout{animation:sproutAnim 1.6s ease-in-out infinite;display:inline-block}
.pulseRing{animation:pulseRing 2s ease-in-out infinite}
.countPop{animation:countPop 1.8s ease-in-out infinite}

.tmpl{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:16px;transition:all .3s var(--spring);}
.tmpl:hover{transform:translateY(-1.5px);box-shadow:0 6px 18px rgba(15,23,42,0.06);border-color:rgba(16,185,129,0.25);}
.tmpl.sel{background:linear-gradient(180deg,#ECFDF5 0%, #F0FDF4 100%);border-color:#10B981;
  box-shadow:0 4px 14px rgba(16,185,129,.14), inset 0 0 0 1px rgba(16,185,129,0.15);}

.dept-h{position:sticky;top:0;z-index:1;background:rgba(236,253,245,0.92);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  padding:6px 14px;font-size:10px;font-weight:800;color:#047857;
  text-transform:uppercase;letter-spacing:0.08em;border-bottom:1px solid rgba(16,185,129,0.1);}

input:focus,textarea:focus{outline:none;box-shadow:0 0 0 4px rgba(16,185,129,.14), inset 0 0 0 1.5px #10B981;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:rgba(16,185,129,0.25);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(16,185,129,0.4);}

input,textarea,select{font-family:inherit;}

/* 비밀번호 보기 아이콘 차단 */
input::-ms-reveal, input::-ms-clear,
input::-webkit-credentials-auto-fill-button,
input::-webkit-strong-password-auto-fill-button,
input::-webkit-contacts-auto-fill-button,
input::-webkit-caps-lock-indicator{
  display:none !important; visibility:hidden !important;
  pointer-events:none !important; width:0 !important;height:0 !important;margin:0 !important;
}

body.modal-open{overflow:hidden;}
.tabular{font-variant-numeric:tabular-nums;}

.cbit{position:fixed;top:-20px;z-index:200;width:8px;height:12px;border-radius:2px;pointer-events:none;animation:confettiFall 2.5s ease-in forwards;}

.sp{display:inline-block;width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.32);border-top-color:#fff;animation:spin-cw 0.7s linear infinite;flex-shrink:0;}
.sp-g{border-color:rgba(16,185,129,0.18);border-top-color:#10B981;}

.pin-input::placeholder{font-size:0.78rem;font-weight:500;letter-spacing:0.02em;color:var(--ink-400);}

.glass{background:rgba(255,255,255,0.72);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,0.5);box-shadow:0 1px 2px rgba(15,23,42,0.04),0 24px 60px rgba(15,23,42,0.12);}
.glass-overlay{background:rgba(15,23,42,0.25);backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%);}
.glass-light{background:rgba(249,250,251,0.85);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);}

.ipt{background:#F8FAFC;border:1.5px solid var(--line);border-radius:16px;
  transition:border-color .2s var(--ease-out), background .2s var(--ease-out);}
.ipt:hover{border-color:rgba(16,185,129,0.22);background:#fff;}

.chip-g{background:linear-gradient(135deg,#ECFDF5 0%, #D1FAE5 100%);color:#047857;border:1px solid rgba(16,185,129,0.18);}

.tab-btn{flex:1;padding:9px 12px;border-radius:12px;
  font-size:13px;font-weight:700;letter-spacing:-0.02em;
  color:#64748B;background:transparent;
  transition:all .25s var(--spring);
  display:flex;align-items:center;justify-content:center;gap:6px;}
.tab-btn.active{background:#fff;color:#047857;
  box-shadow:0 1px 2px rgba(15,23,42,0.04),0 4px 12px rgba(15,23,42,0.06);}

.guide-banner{background:linear-gradient(180deg,#F0FDF4 0%, #ECFDF5 100%);
  border:1px solid rgba(16,185,129,0.16);border-radius:14px;
  padding:11px 13px;font-size:11.5px;font-weight:500;color:#065F46;
  line-height:1.65;letter-spacing:-0.015em;}

.toast-wrap{position:fixed;left:50%;top:18px;transform:translateX(-50%);
  z-index:120;width:calc(100% - 32px);max-width:380px;pointer-events:none;}
.toast{background:linear-gradient(135deg,#047857 0%,#10B981 100%);color:#fff;
  border-radius:18px;padding:13px 16px;display:flex;align-items:center;gap:11px;
  box-shadow:0 4px 14px rgba(6,95,70,0.32),0 16px 40px rgba(6,95,70,0.18);
  animation:toastIn .55s var(--spring) forwards;
  pointer-events:auto;cursor:pointer;border:1px solid rgba(255,255,255,0.18);}
.toast.leaving{animation:toastOut .35s var(--ease-out) forwards;}
.toast-icon{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.22);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.btn-shake{animation:shake .55s ease-in-out, glowPulse 1.6s ease-in-out 0.55s 2;}

/* 룰 안내 카드 */
.rule-card{background:linear-gradient(180deg,#FFFFFF 0%, #FAFDFB 100%);
  border:1px solid var(--line-soft);border-radius:20px;padding:14px 16px;
  box-shadow:0 1px 2px rgba(15,23,42,0.025),0 4px 14px rgba(15,23,42,0.025);}
.rule-line{display:flex;align-items:center;gap:10px;padding:5px 0;
  font-size:12.5px;font-weight:600;color:#334155;letter-spacing:-0.018em;line-height:1.5;}
.rule-line .ico{font-size:16px;flex-shrink:0;width:20px;text-align:center;}

/* 비밀번호 눈 아이콘 */
.pin-wrap{position:relative;}
.pin-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:transparent;border:none;cursor:pointer;
  color:#94A3B8;transition:color .15s var(--ease-out), background .15s var(--ease-out);}
.pin-eye:hover{color:#10B981;background:rgba(16,185,129,0.08);}
.pin-eye:active{transform:translateY(-50%) scale(0.92);}

/* 보상 도달 축하 영역 */
.milestone-card{
  background:linear-gradient(135deg,#FEF3C7 0%, #FEF9C3 100%);
  border:1.5px solid #FCD34D;border-radius:18px;
  padding:16px 14px;margin-top:14px;
  box-shadow:0 4px 14px rgba(245,158,11,0.18);
  animation:popIn .5s var(--spring) .8s both;
}
.milestone-icon{font-size:32px;display:inline-block;animation:giftPulse 1.5s ease-in-out infinite;}

/* Supported by 영역 */
.supported-by{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:18px;padding-top:18px;
  border-top:1px solid rgba(15,23,42,0.06);
}
.supported-line{flex:1;height:1px;max-width:36px;
  background:linear-gradient(90deg,transparent,#A7F3D0);}
.supported-line.right{background:linear-gradient(90deg,#A7F3D0,transparent);}
.supported-content{text-align:center;}
.supported-label{font-size:9.5px;font-weight:700;color:#94A3B8;
  letter-spacing:0.18em;text-transform:uppercase;display:block;margin-bottom:3px;}
.supported-name{font-size:13px;font-weight:800;
  background:linear-gradient(135deg,#047857,#10B981);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.01em;}

/* 공지 배너 */
.notice-banner{background:linear-gradient(135deg,#FEF3C7,#FDE68A);
  border:1px solid #F59E0B;border-radius:16px;padding:12px 14px;
  display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;
  box-shadow:0 2px 8px rgba(245,158,11,0.18);}
.notice-banner .nico{font-size:18px;flex-shrink:0;}
.notice-banner .ntext{flex:1;font-size:12.5px;color:#78350F;font-weight:600;
  letter-spacing:-0.015em;line-height:1.55;white-space:pre-wrap;}
.notice-banner .nclose{flex-shrink:0;width:24px;height:24px;border-radius:50%;
  background:rgba(120,53,15,0.12);color:#78350F;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;}
.notice-banner .nclose:hover{background:rgba(120,53,15,0.22);}

/* QR 미니 버튼 */
.qr-mini-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:14px;
  background:#fff;border:1px solid var(--line);
  font-size:12px;font-weight:700;color:#475569;
  letter-spacing:-0.02em;cursor:pointer;
  transition:all .25s var(--spring);
  box-shadow:0 1px 2px rgba(15,23,42,0.03);
}
.qr-mini-btn:hover{border-color:rgba(16,185,129,0.3);color:#047857;
  transform:translateY(-1px);box-shadow:0 4px 10px rgba(15,23,42,0.06);}

/* QR 스캐너 */
.qr-scanner-wrap{
  position:relative;width:100%;aspect-ratio:1;background:#000;
  border-radius:20px;overflow:hidden;
}
.qr-scanner-wrap video{width:100%;height:100%;object-fit:cover;}
.qr-scan-overlay{position:absolute;inset:0;
  background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.5) 75%);
  pointer-events:none;}
.qr-scan-frame{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:65%;aspect-ratio:1;border:3px solid #10B981;border-radius:16px;
  box-shadow:0 0 0 9999px rgba(0,0,0,0.35);pointer-events:none;}
.qr-scan-line{position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#10B981,transparent);
  animation:scanLine 2s linear infinite;}

/* 관리자 모드 */
.admin-tab{flex:1;padding:8px 6px;border-radius:10px;
  font-size:11px;font-weight:700;letter-spacing:-0.02em;
  color:#64748B;background:transparent;cursor:pointer;
  transition:all .2s;text-align:center;border:none;
  display:flex;align-items:center;justify-content:center;gap:4px;}
.admin-tab.active{background:linear-gradient(135deg,#10B981,#059669);color:#fff;
  box-shadow:0 2px 8px rgba(16,185,129,0.3);}
.admin-card{background:#fff;border:1px solid var(--line-soft);border-radius:14px;
  padding:14px;}
.admin-stat-card{background:linear-gradient(135deg,#ECFDF5,#F0FDF4);
  border:1px solid rgba(16,185,129,0.18);border-radius:14px;padding:12px;}
.adm-btn{padding:7px 12px;border-radius:10px;font-size:11px;font-weight:700;
  letter-spacing:-0.02em;cursor:pointer;border:none;transition:all .2s;
  display:inline-flex;align-items:center;gap:4px;}
.adm-btn-g{background:linear-gradient(135deg,#10B981,#059669);color:#fff;
  box-shadow:0 1px 4px rgba(16,185,129,0.25);}
.adm-btn-g:hover{box-shadow:0 4px 12px rgba(16,185,129,0.35);}
.adm-btn-r{background:linear-gradient(135deg,#F87171,#EF4444);color:#fff;
  box-shadow:0 1px 4px rgba(239,68,68,0.25);}
.adm-btn-w{background:#F8FAFC;color:#64748B;border:1px solid var(--line);}
.adm-btn-w:hover{background:#F1F5F9;border-color:rgba(15,23,42,0.12);}
.adm-input{background:#F8FAFC;border:1.5px solid var(--line);border-radius:10px;
  padding:8px 12px;font-size:13px;font-weight:600;color:#0F172A;width:100%;}
</style>
</head>

const PW_PREFIX = "pw";
const wrapPw = (raw) => PW_PREFIX + raw;

const CHOSUNG_LIST = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const getChosung = (str) => {
  let out = '';
  for (let i = 0; i < str.length; i++) {
    const code = str.charCodeAt(i);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const offset = code - 0xAC00;
      const choIdx = Math.floor(offset / (21 * 28));
      out += CHOSUNG_LIST[choIdx];
    } else if ((code >= 0x3131 && code <= 0x314E) || (code >= 0xFF00 && code <= 0xFFEF)) {
      out += str.charAt(i);
    } else {
      out += str.charAt(i).toLowerCase();
    }
  }
  return out;
};
const isOnlyChosung = (q) => /^[ㄱ-ㅎ\s]+$/.test(q) && q.trim().length > 0;
const matchStaff = (staff, rawQuery) => {
  const q = rawQuery.trim();
  if (!q) return true;
  const lower = staff.toLowerCase();
  if (lower.includes(q.toLowerCase())) return true;
  if (isOnlyChosung(q)) {
    const staffCho = getChosung(staff);
    const qCho = q.replace(/\s/g,'');
    if (staffCho.replace(/\s/g,'').includes(qCho)) return true;
  }
  return false;
};

const parseS = s=>{const [d,n,r]=s.split("-");return{full:s,dept:d,name:n,role:r};};

async function apiCall(p){
  if(!SHEET_URL||SHEET_URL.startsWith("PASTE_")||isPreview())return demo(p);

    const r=await fetch(SHEET_URL,{method:"POST",mode:"cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(p)});

  }catch(e){console.warn("API→demo:",e.message);return demo(p);}
}

function demo(p){
  const s=JSON.parse(localStorage.getItem("gu")||"{}");
  if(!s.u)s.u={};if(!s.m)s.m=[];if(!s.t)s.t={};if(!s.qr)s.qr={};if(!s.qrp)s.qrp=[];if(!s.notice)s.notice={active:false,content:""};
  const save=()=>localStorage.setItem("gu",JSON.stringify(s));
  const kst=()=>{const n=new Date();return new Date(n.getTime()+9*3600000-n.getTimezoneOffset()*60000).toISOString().slice(0,10);};
  if(p.action==="getAllStatuses"){const st={};STAFF.forEach(n=>{st[n]=!!(s.u[n]?.pw);});return{ok:true,statuses:st};}
  if(p.action==="checkUser")return{ok:true,isNew:!s.u[p.name]?.pw};
  if(p.action==="setPassword"){s.u[p.name]={pw:p.password};save();return{ok:true};}
  if(p.action==="login"){if(!s.u[p.name]?.pw||s.u[p.name].pw!==p.password)return{ok:false,error:"비밀번호가 맞지 않아요"};return{ok:true,isAdmin:s.u[p.name].admin||false};}
  if(p.action==="getDashboard"){
    const inbox = s.m.filter(m=>m.to===p.name).sort((a,b)=>b.ts-a.ts);
    const sent = s.m.filter(m=>m.from===p.name).sort((a,b)=>b.ts-a.ts);
    const unreadCount = inbox.filter(m=>!m.read).length;
    return{ok:true,temperature:s.t[p.name]||36.5,inbox,sent,unreadCount,isAdmin:s.u[p.name]?.admin||false};
  }
  if(p.action==="markAsRead"){s.m.forEach(m=>{if(m.to===p.name) m.read=true;});save();return {ok:true};}
  if(p.action==="sendThanks"){
    const today=kst();
    const todaySentTo = new Set();
    const todayRecvFrom = new Set();
    s.m.forEach(m=>{
      const d=new Date(m.ts);
      const md = new Date(d.getTime()+9*3600000-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
      if(md!==today) return;
      if(m.from===p.from) todaySentTo.add(m.to);
      if(m.to===p.to) todayRecvFrom.add(m.from);
    });
    const alreadySent = todaySentTo.has(p.to);
    const fromCapped = todaySentTo.size >= 3;
    const alreadyRecv = todayRecvFrom.has(p.from);
    const toCapped = todayRecvFrom.size >= 3;
    const fromShouldRise = !alreadySent && !fromCapped;
    const toShouldRise = !alreadyRecv && !toCapped;
    let reason = "rose";
    if(alreadySent) reason = "duplicate_recipient";
    else if(fromCapped) reason = "daily_cap_reached";
    s.m.push({from:p.from,to:p.to,templates:p.templates,message:p.message,ts:Date.now(),read:false});
    const oldTemp = s.t[p.from]||36.5;
    if(fromShouldRise) s.t[p.from] = oldTemp+1;
    if(toShouldRise) s.t[p.to] = (s.t[p.to]||36.5)+1;
    if(!s.t[p.from]) s.t[p.from]=36.5;
    let milestone = 0;
    if(fromShouldRise){
      const newTemp = s.t[p.from];
      if(oldTemp<60 && newTemp>=60) milestone=60;
      else if(oldTemp<80 && newTemp>=80) milestone=80;
      else if(oldTemp<100 && newTemp>=100) milestone=100;
    }
    save();
    return{ok:true,myTemp:s.t[p.from],rose:fromShouldRise,reason,milestone};
  }
  if(p.action==="sendEmailNotification") return {ok:true};
  if(p.action==="getNotice") return {ok:true,active:s.notice.active,content:s.notice.content};
  if(p.action==="verifyQR"){
    const ev = s.qr[p.eid];
    if(!ev) return {ok:false,status:"invalid",error:"유효하지 않은 QR이에요"};
    if(ev.token!==p.token) return {ok:false,status:"invalid",error:"유효하지 않은 QR이에요"};
    if(new Date(ev.expiresAt) < new Date()) return {ok:false,status:"expired",eventName:ev.name,error:"만료된 QR이에요"};
    const today=kst();
    const already = s.qrp.some(x=>x.staff===p.name && x.eid===p.eid);
    const todayQr = s.qrp.some(x=>{
      if(x.staff!==p.name) return false;
      const d=new Date(x.ts);
      const md=new Date(d.getTime()+9*3600000-d.getTimezoneOffset()*60000).toISOString().slice(0,10);
      return md===today;
    });
    if(already) return {ok:false,status:"already_joined",eventName:ev.name,error:"이미 참여한 행사예요"};
    if(todayQr) return {ok:false,status:"daily_qr_used",eventName:ev.name,error:"오늘은 이미 QR로 온도가 올랐어요"};
    const oldTemp=s.t[p.name]||36.5;
    const newTemp=oldTemp+1;
    s.t[p.name]=newTemp;
    s.qrp.push({ts:Date.now(),staff:p.name,eid:p.eid,name:ev.name});
    let milestone=0;
    if(oldTemp<60 && newTemp>=60) milestone=60;
    else if(oldTemp<80 && newTemp>=80) milestone=80;
    else if(oldTemp<100 && newTemp>=100) milestone=100;
    save();
    return{ok:true,status:"success",eventName:ev.name,oldTemp,newTemp,milestone};
  }
  if(p.action==="adminCheckAccess") return {ok:!!s.u[p.name]?.admin,isAdmin:!!s.u[p.name]?.admin};
  if(p.action==="adminGetStats") return {ok:true,totalAll:s.m.length,totalActive:STAFF.length,activeUsers:Object.keys(s.t).length,tempBuckets:{c0:STAFF.length-Object.keys(s.t).length,c60:0,c80:0,c100:0},topSenders:[],topReceivers:[],daily:[],monthly:[]};
  if(p.action==="adminGetAllStaff"){
    return{ok:true,staff:STAFF.filter(f=>f!==p.name).map(f=>{const ps=parseS(f);return{full:f,name:ps.name,dept:ps.dept,role:ps.role,email:"",hasPassword:!!s.u[f]?.pw,isAdmin:false,active:true,temp:s.t[f]||36.5};})};
  }
  if(p.action==="adminResetPassword"){if(s.u[p.target])delete s.u[p.target].pw;save();return{ok:true};}
  if(p.action==="adminResetTemp"){if(p.target==="_all_"){s.t={};}else{s.t[p.target]=36.5;}save();return{ok:true};}
  if(p.action==="adminGetQRList"){const qrs=Object.entries(s.qr).map(([id,v])=>({id,name:v.name,created:v.created,expiresAt:v.expiresAt,token:v.token,active:v.active!==false,participants:s.qrp.filter(x=>x.eid===id).length}));return{ok:true,qrs};}
  if(p.action==="adminCreateQR"){const id="ev_"+Date.now();const token=Math.random().toString(36).slice(2);const expiresAt=p.expiresAt||new Date(Date.now()+7*86400000).toISOString();s.qr[id]={name:p.eventName,created:new Date().toISOString(),expiresAt,token,active:true};save();return{ok:true,id,token,eventName:p.eventName,expiresAt};}
  if(p.action==="adminDeleteQR"){if(s.qr[p.eid])s.qr[p.eid].active=false;save();return{ok:true};}
  if(p.action==="adminUpdateNotice"){s.notice={active:!!p.active,content:p.content||""};save();return{ok:true};}
  if(p.action==="adminAddStaff"||p.action==="adminUpdateStaff"||p.action==="adminDeactivateStaff") return {ok:true};
  return{ok:false,error:"알 수 없는 요청"};
}

function playDing(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const now = ctx.currentTime;
    const notes = [{f:880, t:now, d:0.18, v:0.18},{f:1320,t:now+0.10, d:0.32, v:0.14}];
    notes.forEach(({f,t,d,v})=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type='sine'; osc.frequency.value=f;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(v,t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001,t+d);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t); osc.stop(t+d+0.05);
    });
    setTimeout(()=>ctx.close(),700);
  }catch(e){}
}

function Thermometer({temp}){
  const TX=60,BOT=208,TOP=22,H=BOT-TOP,BCY=236,BRO=24,BRI=18;
  const MH=H+(BCY+BRI+6-BOT);
  const ratio=Math.max(0,Math.min(1,(temp-36.5)/(100-36.5)));
  const tY=-ratio*H;
  const yAt = (val)=>BOT-((val-36.5)/(100-36.5))*H;
  return(
    <svg viewBox="0 0 165 275" style={{height:"220px",overflow:"visible"}} aria-label={`온도 ${temp.toFixed(1)}도`}>
      <defs>
        <clipPath id="mc"><rect x="52" y={TOP} width="16" height={BOT-TOP+4} rx="8"/><circle cx={TX} cy={BCY} r={BRI}/></clipPath>
        <linearGradient id="mg" gradientUnits="objectBoundingBox" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0%" stopColor="#064E3B"/><stop offset="45%" stopColor="#059669"/><stop offset="100%" stopColor="#34D399"/>
        </linearGradient>
        <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stopColor="#F1F5F9"/><stop offset="100%" stopColor="#E2E8F0"/>
        </linearGradient>
      </defs>
      <rect x="47" y="14" width="26" height={BOT-14+4} rx="13" fill="url(#tube)" stroke="rgba(15,23,42,0.06)" strokeWidth="1"/>
      <circle cx={TX} cy={BCY} r={BRO} fill="url(#tube)" stroke="rgba(15,23,42,0.06)" strokeWidth="1"/>
      <g clipPath="url(#mc)">
        <rect x="45" y={BOT} width="30" height={MH} fill="url(#mg)"
              style={{transform:`translateY(${tY}px)`,transition:"transform 1.2s cubic-bezier(.34,1.56,.64,1)"}}/>
      </g>
      <rect x="51" y="16" width="5" height={BOT-16+4} rx="2.5" fill="rgba(255,255,255,0.55)"/>
      <ellipse cx={TX-9} cy={BCY-8} rx="4" ry="6" fill="rgba(255,255,255,0.38)"/>
      {[50,70,90].map(t=>(<line key={t} x1="74" y1={yAt(t)} x2="77" y2={yAt(t)} stroke="#CBD5E1" strokeWidth="1"/>))}
      <line x1="74" y1={yAt(60)} x2="83" y2={yAt(60)} stroke="#059669" strokeWidth="1.8"/>
      <text x="86" y={yAt(60)+4} fontSize="8.5" fontWeight="800" fill="#047857">60°C</text>
      <text x="111" y={yAt(60)+5} fontSize="11">☕</text>
      <line x1="74" y1={yAt(80)} x2="83" y2={yAt(80)} stroke="#059669" strokeWidth="1.8"/>
      <text x="86" y={yAt(80)+4} fontSize="8.5" fontWeight="800" fill="#047857">80°C</text>
      <text x="111" y={yAt(80)+5} fontSize="11">☕</text>
      <line x1="74" y1={yAt(100)} x2="83" y2={yAt(100)} stroke="#059669" strokeWidth="1.8"/>
      <text x="86" y={yAt(100)+4} fontSize="8.5" fontWeight="800" fill="#047857">100°C</text>
      <text x="111" y={yAt(100)+5} fontSize="11">🎁</text>
    </svg>
  );
}

function LoadingScreen({visible}){

  useEffect(()=>{
    if(!visible){setStep(0);setPct(0);return;}
    const t=setInterval(()=>{
      setStep(s=>{const next=Math.min(s+1,LOAD_STEPS.length-1);setPct(Math.round((next+1)/LOAD_STEPS.length*100));return next;});
    },350);
    return()=>clearInterval(t);
  },[visible]);
  if(!visible)return null;
  return(
    <div className="fixed inset-0 z-[90] flex items-center justify-center fadeIn glass-light">
      <div className="text-center px-6 w-full max-w-[300px]">

function NotifyToast({toast, onClose}){
  const [leaving,setLeaving]=useState(false);
  useEffect(()=>{
    if(!toast)return;
    const t=setTimeout(()=>{setLeaving(true);},4200);
    const t2=setTimeout(()=>{onClose();},4600);
    return()=>{clearTimeout(t);clearTimeout(t2);};
  },[toast,onClose]);
  if(!toast)return null;
  const handleClick=()=>{
    setLeaving(true);
    setTimeout(()=>{onClose();if(toast.onTap)toast.onTap();},300);
  };
  return(
    <div className="toast-wrap">
      <div className={`toast ${leaving?"leaving":""}`} onClick={handleClick}>
        <div className="toast-icon">{toast.icon||"💌"}</div>
        <div className="flex-1 min-w-0">
          <div className="font-extrabold text-sm track-tight leading-snug">{toast.title}</div>
          {toast.body&&<div className="text-[12px] text-white/85 font-medium leading-snug mt-0.5 truncate">{toast.body}</div>}
        </div>
        <div className="text-[10px] font-bold text-white/70 flex-shrink-0">탭하기</div>
      </div>
    </div>
  );
}

function Dashboard({me,onLogout,isAdmin,onOpenAdmin}){
  const [loading,setLoading]=useState(true);
  const [temp,setTemp]=useState(36.5);
  const [inbox,setInbox]=useState([]);
  const [sent,setSent]=useState([]);
  const [unreadCount,setUnreadCount]=useState(0);
  const [compose,setCompose]=useState(false);
  const [ibOpen,setIbOpen]=useState(false);
  const [qrScan,setQrScan]=useState(false);
  const [toast,setToast]=useState(null);
  const [shake,setShake]=useState(false);
  const [notice,setNotice]=useState({active:false,content:""});
  const [noticeClosed,setNoticeClosed]=useState(false);

  const knownTsRef = useRef(new Set());
  const initialLoadRef = useRef(true);
  const handleOpenInboxRef = useRef(null);

  const load=useCallback(async(opts={})=>{
    if(opts.silent!==true)setLoading(true);
    const r=await apiCall({action:"getDashboard",name:me});
    if(r.ok){
      setTemp(r.temperature);
      const newInbox = r.inbox||[];
      const newSent = r.sent||[];
      const newUnread = typeof r.unreadCount==='number'?r.unreadCount:newInbox.filter(m=>!m.read).length;

      if(initialLoadRef.current){
        newInbox.forEach(m=>knownTsRef.current.add(m.ts));
        initialLoadRef.current=false;
        if(newUnread>0){
          setToast({
            icon:"💌",
            title:`새 쪽지가 ${newUnread}개 도착했어요!`,
            body:"쪽지함을 열어 따뜻한 마음을 확인해보세요",
            onTap:()=>handleOpenInboxRef.current && handleOpenInboxRef.current()
          });
          playDing();
          setShake(true);setTimeout(()=>setShake(false),3500);
        }
      }else{
        const fresh = newInbox.filter(m=>!knownTsRef.current.has(m.ts));
        if(fresh.length>0){
          fresh.forEach(m=>knownTsRef.current.add(m.ts));
          const latest = fresh[0];
          const sender = latest && latest.from ? parseS(latest.from) : null;
          setToast({
            icon:"💌",
            title: fresh.length===1
              ? `${sender?sender.name+" "+sender.role:"누군가"}님이 감사를 전했어요`
              : `새 쪽지가 ${fresh.length}개 도착했어요!`,
            body: fresh.length===1
              ? "쪽지함을 열어 확인해보세요"
              : "쪽지함을 열어 따뜻한 마음을 확인해보세요",
            onTap:()=>handleOpenInboxRef.current && handleOpenInboxRef.current()
          });
          playDing();
          setShake(true);setTimeout(()=>setShake(false),3500);
        }
      }

      setInbox(newInbox);
      setSent(newSent);
      setUnreadCount(newUnread);
    }
    if(opts.silent!==true)setLoading(false);
  },[me]);

  const loadNotice = useCallback(async()=>{
    const r=await apiCall({action:"getNotice"});
    if(r.ok) setNotice({active:r.active,content:r.content});
  },[]);

  useEffect(()=>{load();loadNotice();},[load,loadNotice]);
  useEffect(()=>{
    const intv = setInterval(()=>{
      if(!document.hidden){load({silent:true});loadNotice();}
    },60*1000);
    const onVisible = ()=>{ if(!document.hidden){load({silent:true});loadNotice();} };
    document.addEventListener('visibilitychange',onVisible);
    return ()=>{clearInterval(intv);document.removeEventListener('visibilitychange',onVisible);};
  },[load,loadNotice]);

  const onSent=(payload)=>{
    setCompose(false);
    setTimeout(()=>{setTemp(payload.newTemp);load({silent:true});},320);
  };

  const onQrSuccess=(newTemp)=>{
    setTemp(newTemp);
    setTimeout(()=>load({silent:true}),320);
  };

  const handleOpenInbox=async()=>{
    setIbOpen(true);
    if(unreadCount>0){
      apiCall({action:"markAsRead",name:me}).then(()=>{
        setUnreadCount(0);
        setInbox(prev=>prev.map(m=>({...m,read:true})));
      }).catch(()=>{});
    }
  };
  useEffect(()=>{handleOpenInboxRef.current=handleOpenInbox;});

  const pm=parseS(me);
  const ri=rewardInfo(temp);

  return(
    <>
      <LoadingScreen visible={loading}/>

              <div>
                <h1 className="logo-font text-[24px] leading-none track-tighter" style={{background:"linear-gradient(135deg,#064E3B,#10B981)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>감사해U</h1>
                <p className="text-[10px] font-extrabold text-slate-400 tracking-widest mt-0.5">밀알복지재단</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              {isAdmin && (
                <button onClick={onOpenAdmin} className="text-xs font-bold text-emerald-700 px-3 py-2 rounded-full btn track-tight"

                      style={{border:"1px solid var(--line)",boxShadow:"0 1px 2px rgba(15,23,42,0.03)"}}>로그아웃</button>

          {showNotice && <NoticeBanner notice={notice} onClose={()=>setNoticeClosed(true)}/>}

          <div className="card p-4 mb-3 slideUp flex items-center gap-3" style={{animationDelay:"0.06s"}}>

                 style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",color:"#047857"}}>{pm.name.charAt(0)}</div>

                <div className="absolute top-2.5 right-2.5 min-w-[20px] h-5 px-1 rounded-full bg-white text-emerald-700 font-extrabold text-xs flex items-center justify-center countPop"
                     style={{boxShadow:"0 2px 6px rgba(6,95,70,0.25)"}}>{unreadCount}</div>
              )}
            </button>
          </div>

          <div className="flex justify-center mb-3 slideUp" style={{animationDelay:"0.20s"}}>
            <button onClick={()=>setQrScan(true)} className="qr-mini-btn">
              <span style={{fontSize:14}}>📷</span>
              <span>행사 QR 스캔</span>
            </button>
          </div>

          <div className="rule-card slideUp" style={{animationDelay:"0.22s"}}>
            <div className="rule-line"><span className="ico">💌</span><span>쪽지는 매일 무제한으로 보낼 수 있어요</span></div>
            <div className="rule-line"><span className="ico">🌡️</span><span>온도는 하루 최대 3°C까지 올라가요</span></div>
            <div className="rule-line"><span className="ico">💚</span><span>같은 분께 중복으로 보내도 서로 하루에 1°C만 올라요</span></div>
          </div>

          <AppFooter/>
        </div>
      </div>
      {compose&&<ComposeModal me={me} currentTemp={temp} onClose={()=>setCompose(false)} onSent={onSent}/>}
      {ibOpen&&<InboxModal inbox={inbox} sent={sent} onClose={()=>setIbOpen(false)}/>}
      {qrScan&&<QRScanModal me={me} currentTemp={temp} onClose={()=>setQrScan(false)} onSuccess={onQrSuccess}/>}
    </>
  );
}

function ComposeModal({me,currentTemp,onClose,onSent}){
  const [rec,setRec]=useState("");
  const [sel,setSel]=useState([]);
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");
  const [sending,setSending]=useState(false);
  const [success,setSuccess]=useState(null);
  const [rOpen,setROpen]=useState(false);
  const [rSearch,setRSearch]=useState("");

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  const toggle=id=>setSel(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const receivers=useMemo(()=>STAFF.filter(s=>s!==me),[me]);
  const filtered=useMemo(()=>{
    const q=rSearch.trim();
    return q?receivers.filter(s=>matchStaff(s,q)):receivers;
  },[rSearch,receivers]);
  const grouped=useMemo(()=>groupByDept(filtered),[filtered]);

  const send=async()=>{
    setErr("");
    if(!rec){setErr("받는 분을 선택해주세요");return;}
    if(!sel.length && !msg.trim()){
      setErr("직접 쓴 메시지나 감사 템플릿 중 하나는 채워주세요");
      return;
    }
    setSending(true);
    const r=await apiCall({action:"sendThanks",from:me,to:rec,templates:sel,message:msg.trim()});
    setSending(false);
    if(!r.ok){setErr(r.error||"전송 실패");return;}

    apiCallFireForget({action:"sendEmailNotification",from:me,to:rec});

    fireConfetti();
    setSuccess({oldTemp:currentTemp,newTemp:r.myTemp,rose:r.rose,reason:r.reason,milestone:r.milestone||0});
    const closeDelay = r.milestone>0 ? 5000 : (r.rose ? 3400 : 4500);
    setTimeout(()=>onSent({newTemp:r.myTemp,rose:r.rose,reason:r.reason}), closeDelay);
  };

  const rp=rec?parseS(rec):null;

  return(
    <div className="fixed inset-0 z-[80] flex items-end sm:items-center justify-center sm:p-4 fadeIn glass-overlay">
      <div className="glass w-full max-w-md rounded-t-[28px] sm:rounded-[28px] max-h-[92vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid rgba(15,23,42,0.06)"}}>
          <div className="flex items-center gap-2.5">
            <span className="text-lg wiggle">✍️</span>
            <h2 className="font-extrabold text-slate-900 track-tight">감사 쪽지 쓰기</h2>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100/80 flex items-center justify-center text-slate-400 btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="flex-1 overflow-y-auto relative" style={{background:"rgba(255,255,255,0.6)"}}>
          {sending&&(
            <div className="absolute inset-0 flex flex-col items-center justify-center z-20 glass-light">
              <div className="sp sp-g mb-4" style={{width:44,height:44,borderWidth:3.5}}/>
              <p className="text-base font-extrabold text-slate-800 track-tight">따뜻한 마음을 전송 중이에요</p>
              <p className="text-xs text-slate-400 mt-1.5 font-medium">조금만 기다려 주세요</p>
            </div>
          )}
          <div className="p-5 space-y-5">

            <div className="guide-banner">
              받는 분을 선택한 뒤, 쪽지를 직접 작성하거나 템플릿을 골라 감사를 전해보세요. 둘 중 하나만 사용해도 좋고, 함께 사용해도 좋아요. 작은 한 마디가 상대의 하루를 따뜻하게 만들어줄 거예요.
            </div>

            <div>
              <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">받는 분</label>
              <div className="relative">
                <button onClick={()=>setROpen(o=>!o)}
                  className="ipt w-full px-4 py-3.5 flex items-center justify-between text-sm btn hover:border-emerald-300/60">
                  {rp?(
                    <div className="flex items-center gap-2.5 min-w-0">
                      <div className="w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-xs flex-shrink-0"
                           style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",color:"#047857"}}>{rp.name.charAt(0)}</div>
                      <div className="min-w-0 text-left">
                        <div className="font-extrabold text-slate-900 truncate text-sm track-tight">{rp.name} <span className="text-slate-400 font-medium text-xs">{rp.role}</span></div>
                        <div className="text-[10px] text-slate-400 truncate font-medium">{rp.dept}</div>
                      </div>
                    </div>
                  ):<span className="text-slate-300 font-semibold">누구에게 감사를 전할까요?</span>}
                  <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" className="text-slate-400 flex-shrink-0 transition-transform duration-200" style={{transform:rOpen?"rotate(180deg)":"rotate(0deg)"}}>
                    <path d="m6 9 6 6 6-6"/>
                  </svg>
                </button>
                {rOpen&&(
                  <div className="absolute top-full left-0 right-0 mt-2 bg-white rounded-2xl max-h-80 overflow-y-auto z-10 popIn"
                       style={{border:"1px solid rgba(15,23,42,0.06)",boxShadow:"0 1px 2px rgba(15,23,42,0.04),0 20px 48px rgba(15,23,42,0.12)"}}>
                    <input type="text" value={rSearch} onChange={e=>setRSearch(e.target.value)}
                      placeholder="이름·부서·초성(ㄱㅈㅇ) 검색" autoFocus
                      className="w-full px-4 py-3 text-sm bg-transparent font-semibold text-slate-700 placeholder-slate-300 track-tight"
                      style={{borderBottom:"1px solid rgba(15,23,42,0.05)"}}/>
                    {Object.entries(grouped).map(([dept,members])=>(
                      <div key={dept}>
                        <div className="dept-h">{dept}</div>
                        {members.map(m=><PersonItem key={m._key} person={m} onSelect={k=>{setRec(k);setROpen(false);setRSearch("");}}/>)}
                      </div>
                    ))}
                    {filtered.length===0&&(
                      <div className="p-5 text-sm text-center text-slate-400 font-medium">검색 결과가 없어요</div>
                    )}
                  </div>
                )}
              </div>
            </div>

            <div>
              <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">
                마음을 담은 한 마디 <span className="normal-case tracking-normal font-semibold text-slate-400">(직접 작성)</span>
              </label>
              <textarea value={msg} onChange={e=>setMsg(e.target.value.slice(0,300))}
                placeholder="구체적인 감사의 마음을 전해보세요"
                className="ipt w-full px-4 py-3.5 text-slate-700 placeholder-slate-300 resize-none font-semibold text-sm leading-relaxed track-tight" rows={3}/>
              <div className="text-right text-[11px] text-slate-300 mt-1 tabular font-semibold">{msg.length}/300</div>
            </div>

            <div>
              <label className="block text-[11px] font-extrabold text-slate-600 mb-2 tracking-widest uppercase">
                감사 템플릿 <span className="normal-case tracking-normal font-semibold text-slate-400">(중복 선택 가능 · {sel.length}개)</span>
              </label>
              <div className="space-y-2">
                {TMPLS.map(t=>{
                  const s=sel.includes(t.id);
                  return(
                    <div key={t.id} onClick={()=>toggle(t.id)} className={`tmpl p-3.5 flex items-start gap-3 ${s?"sel":""}`}>
                      <span className="text-xl flex-shrink-0 mt-0.5">{t.emoji}</span>
                      <span className="flex-1 text-sm font-semibold text-slate-700 leading-relaxed track-tight">{t.text}</span>
                      <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 mt-0.5 transition-all duration-300`}
                           style={s?{background:"linear-gradient(135deg,#10B981,#059669)",borderColor:"#059669",boxShadow:"0 2px 6px rgba(16,185,129,0.3)"}:{borderColor:"#CBD5E1",background:"#fff"}}>
                        {s&&<svg width="11" height="11" fill="none" stroke="white" strokeWidth="3.5" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {err&&<div className="rounded-2xl p-3.5 text-center text-sm text-rose-500 font-semibold" style={{background:"#FEF2F2",border:"1px solid #FECACA"}}>{err}</div>}
          </div>
        </div>

        <div className="p-5" style={{borderTop:"1px solid rgba(15,23,42,0.06)",background:"rgba(255,255,255,0.6)"}}>
          <button onClick={send} disabled={sending} className="w-full py-4 rounded-2xl btn btn-g text-sm disabled:opacity-60 track-tight">
            감사 전하기 💚
          </button>
        </div>
      </div>
      {success&&<SuccessModal oldTemp={success.oldTemp} newTemp={success.newTemp} rose={success.rose} reason={success.reason} milestone={success.milestone}/>}
    </div>
  );
}

function SuccessModal({oldTemp,newTemp,rose,reason,milestone}){
  const [disp,setDisp]=useState(oldTemp);
  useEffect(()=>{
    if(!rose){setDisp(oldTemp);return;}
    let raf,start;
    const run=()=>{
      if(!start)start=Date.now();
      const t=Math.min((Date.now()-start)/1400,1);
      setDisp(oldTemp+(newTemp-oldTemp)*(1-Math.pow(1-t,3)));
      if(t<1)raf=requestAnimationFrame(run);
    };
    const tid=setTimeout(()=>{raf=requestAnimationFrame(run);},380);
    return()=>{clearTimeout(tid);raf&&cancelAnimationFrame(raf);};
  },[oldTemp,newTemp,rose]);
  const r=Math.max(0,Math.min(1,(disp-36.5)/(100-36.5)));

  let caseUI;
  if(rose){
    caseUI = (
      <>
        <div className="flex items-center justify-center gap-4 mb-3">
          <div className="relative flex-shrink-0" style={{width:"26px",height:"68px"}}>
            <div className="absolute inset-x-0 top-0 bottom-3 bg-white rounded-full" style={{border:"1px solid rgba(16,185,129,0.25)"}}/>
            <div className="absolute inset-x-1 bottom-3 rounded-full" style={{height:`${r*48+4}px`,background:"linear-gradient(to top,#064E3B,#059669,#34D399)",transition:"none"}}/>
            <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-6 rounded-full" style={{background:"linear-gradient(135deg,#047857,#10B981)",boxShadow:"0 2px 6px rgba(6,95,70,0.3)",border:"1px solid rgba(16,185,129,0.5)"}}/>
          </div>
          <div className="text-left">
            <div className="flex items-baseline gap-0.5">
              <span className="fw900 tabular" style={{fontSize:"44px",lineHeight:1,background:"linear-gradient(160deg,#064E3B,#059669)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:"-0.04em"}}>{disp.toFixed(1)}</span>
              <span className="text-xl fw800 text-emerald-600">°C</span>
            </div>
            <div className="text-[11px] text-slate-400 tabular mt-0.5 font-semibold">이전 {oldTemp.toFixed(1)}°C</div>
          </div>
        </div>
        <div className="inline-flex items-center gap-1.5 text-white text-xs font-extrabold px-3.5 py-1.5 rounded-full track-tight"
             style={{background:"linear-gradient(135deg,#047857,#10B981)",boxShadow:"0 3px 10px rgba(16,185,129,0.3)",animation:"badgeIn .5s cubic-bezier(.34,1.56,.64,1) .9s both"}}>
          <span style={{animation:"arrowUp 1.2s ease-in-out infinite"}}>▲</span>
          <span className="tabular">+1.0°C 따뜻해졌어요</span>
        </div>
      </>
    );
  }else if(reason==="duplicate_recipient"){
    caseUI = (
      <div className="px-2">
        <div className="text-3xl mb-2">💚</div>
        <p className="text-base font-extrabold text-slate-800 track-tight leading-snug mb-1">지금은 온도가 오르지 않아요</p>
        <p className="text-sm font-semibold text-slate-600 leading-relaxed track-tight">오늘 이미 이분께 감사를 전하셨네요 💚</p>
      </div>
    );
  }else{
    caseUI = (
      <div className="px-2">
        <div className="text-3xl mb-2">🎉</div>
        <p className="text-base font-extrabold text-slate-800 track-tight leading-snug mb-1">하루 최대 온도 3°C가 이미 채워져</p>
        <p className="text-sm font-extrabold text-slate-800 track-tight">온도는 오르지 않아요 🎉</p>
      </div>
    );
  }

  return(
    <div className="fixed inset-0 z-[95] flex items-center justify-center p-4 fadeIn glass-overlay">
      <div className="glass rounded-[28px] p-7 w-full max-w-[340px] text-center scaleIn">
        <div className="w-14 h-14 mx-auto mb-3 rounded-full flex items-center justify-center pulseRing"
             style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)"}}>
          <svg width="28" height="28" fill="none" stroke="#047857" strokeWidth="3.2" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h2 className="logo-font text-xl text-slate-900 mb-4 track-tighter">감사한 마음을 전했어요</h2>
        <div className="rounded-2xl p-5 mb-4"
             style={{background:"linear-gradient(180deg,#ECFDF5,#F0FDF4)",border:"1px solid rgba(16,185,129,0.18)"}}>
          {caseUI}
        </div>
        <div style={{animation: rose ? "msgIn .5s ease-out 1.1s both" : "msgIn .4s ease-out both"}}>
          {rose ? (
            <p className="text-sm font-semibold text-slate-600 leading-relaxed track-tight">당신의 소중한 감사 덕에<br/>상대의 마음의 온도도 1도 올라갔습니다 💚</p>
          ) : reason==="duplicate_recipient" ? (
            <p className="text-sm font-semibold text-slate-600 leading-relaxed track-tight">하지만 당신의 따뜻한 마음은<br/>한 번 더 전달되었어요 🌱</p>
          ) : (
            <p className="text-sm font-semibold text-slate-600 leading-relaxed track-tight">하지만 당신의 따뜻한 마음은<br/>변함없이 전달되었어요 💚</p>
          )}
        </div>

        {milestone>0 && (
          <div className="milestone-card">
            <span className="milestone-icon">{milestone===100?"🎁":"☕"}</span>
            <p className="font-extrabold text-amber-900 text-base mt-2 track-tight">🎉 축하드립니다!</p>
            <p className="text-sm font-bold text-amber-800 mt-0.5 track-tight">{milestone}°C 보상에 도달하셨어요</p>
            <p className="text-[12px] font-medium text-amber-700 mt-2 leading-relaxed">
              밀알디아코니아연구소에서<br/>
              선물을 지급할 예정이오니<br/>
              교육문화팀에 신청 부탁드립니다.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

function InboxModal({inbox,sent,onClose}){
  const [tab,setTab]=useState("inbox");
  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  const list = tab==="inbox" ? inbox : sent;

  return(
    <div className="fixed inset-0 z-[80] flex items-end sm:items-center justify-center sm:p-4 fadeIn glass-overlay">
      <div className="glass w-full max-w-md rounded-t-[28px] sm:rounded-[28px] max-h-[92vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid rgba(15,23,42,0.06)"}}>
          <div className="flex items-center gap-2.5">
            <span className="text-lg wiggle">💌</span>
            <h2 className="font-extrabold text-slate-900 track-tight">쪽지함</h2>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100/80 flex items-center justify-center text-slate-400 btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="px-5 pt-4">
          <div className="flex gap-1 p-1 rounded-2xl" style={{background:"#F1F5F9"}}>
            <button onClick={()=>setTab("inbox")} className={`tab-btn ${tab==="inbox"?"active":""}`}>
              📥 받은 쪽지
              <span className="ml-1 tabular text-[11px] font-extrabold" style={{color:tab==="inbox"?"#10B981":"#94A3B8"}}>{inbox.length}</span>
            </button>
            <button onClick={()=>setTab("sent")} className={`tab-btn ${tab==="sent"?"active":""}`}>
              📤 보낸 쪽지
              <span className="ml-1 tabular text-[11px] font-extrabold" style={{color:tab==="sent"?"#10B981":"#94A3B8"}}>{sent.length}</span>
            </button>
          </div>
        </div>

        <div className="flex-1 overflow-y-auto p-5 space-y-3" style={{background:"rgba(255,255,255,0.6)"}}>
          {list.length===0?(
            <div className="py-14 text-center">
              <div className="text-5xl mb-3 bounceY">{tab==="inbox"?"📭":"✉️"}</div>
              <p className="font-extrabold text-slate-700 track-tight">
                {tab==="inbox"?"아직 받은 쪽지가 없어요":"아직 보낸 쪽지가 없어요"}
              </p>
              <p className="text-xs text-slate-400 mt-1.5 font-medium">
                {tab==="inbox"?"먼저 감사를 전해보는 건 어떨까요?":"오늘의 감사를 누군가에게 전해보세요"}
              </p>
            </div>
          ):list.map((m,i)=>{
            const counterpart = tab==="inbox" ? m.from : m.to;
            const s=parseS(counterpart);
            const ts=(m.templates||[]).map(id=>TMPLS.find(t=>t.id===id)).filter(Boolean);
            const d=new Date(m.ts);
            const ds=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
            return(
              <div key={i} className="rounded-2xl p-4 popIn"
                   style={{background:"#fff",border:"1px solid var(--line-soft)",boxShadow:"0 1px 2px rgba(15,23,42,0.03),0 4px 14px rgba(15,23,42,0.03)",animationDelay:`${i*.04}s`}}>
                <div className="flex items-center gap-3 mb-3">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center font-extrabold flex-shrink-0"
                       style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",color:"#047857"}}>{s.name.charAt(0)}</div>
                  <div className="min-w-0 flex-1">
                    <div className="flex items-center gap-1.5">
                      <span className="text-[10px] font-extrabold rounded-full px-1.5 py-0.5 tracking-wider"
                            style={{background:tab==="inbox"?"#ECFDF5":"#F1F5F9",color:tab==="inbox"?"#047857":"#475569"}}>
                        {tab==="inbox"?"FROM":"TO"}
                      </span>
                      <div className="font-extrabold text-slate-900 text-sm truncate track-tight">
                        {s.name} <span className="text-xs font-medium text-slate-400">{s.role}</span>
                      </div>
                    </div>
                    <div className="text-[11px] text-slate-400 tabular truncate font-medium mt-0.5">{s.dept} · {ds}</div>
                  </div>
                </div>
                {ts.length>0 && (
                  <div className="space-y-1.5 mb-2">
                    {ts.map(t=>(
                      <div key={t.id} className="flex items-start gap-2 rounded-xl p-2.5"
                           style={{background:"#F8FAFC",border:"1px solid var(--line-soft)"}}>
                        <span className="text-base flex-shrink-0">{t.emoji}</span>
                        <span className="text-sm font-semibold text-slate-700 leading-relaxed track-tight">{t.text}</span>
                      </div>
                    ))}
                  </div>
                )}
                {m.message&&(
                  <div className="rounded-xl p-3.5 mt-2"
                       style={{background:"linear-gradient(180deg,#ECFDF5,#F0FDF4)",borderLeft:"3px solid #10B981"}}>
                    <p className="text-sm font-semibold text-slate-700 leading-relaxed whitespace-pre-wrap track-tight">"{m.message}"</p>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// QR 스캔 모달
// ============================================================
function QRScanModal({me,currentTemp,onClose,onSuccess}){
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const scannedRef = useRef(false);
  const [status,setStatus]=useState("scanning"); // scanning, processing, success, fail
  const [result,setResult]=useState(null);
  const [errMsg,setErrMsg]=useState("");
  const [camErr,setCamErr]=useState("");

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  useEffect(()=>{
    let cancelled = false;
    const startCamera = async()=>{
      try{
        const stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode: { ideal: "environment" }, width:{ideal:1280}, height:{ideal:720} },
          audio:false
        });
        if(cancelled){ stream.getTracks().forEach(t=>t.stop()); return; }
        streamRef.current = stream;
        if(videoRef.current){
          videoRef.current.srcObject = stream;
          await videoRef.current.play();
          tick();
        }
      }catch(e){
        console.error("카메라 접근 실패:",e);
        setCamErr("카메라 권한이 필요해요. 브라우저 설정에서 허용해주세요.");
      }
    };

    const tick = ()=>{
      if(scannedRef.current || cancelled){ return; }
      const v = videoRef.current;
      const c = canvasRef.current;
      if(!v || !c || v.readyState !== 4 || !window.jsQR){
        rafRef.current = requestAnimationFrame(tick);
        return;
      }
      c.width = v.videoWidth;
      c.height = v.videoHeight;
      const ctx = c.getContext("2d");
      ctx.drawImage(v,0,0,c.width,c.height);
      try{
        const imageData = ctx.getImageData(0,0,c.width,c.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts:"dontInvert" });
        if(code && code.data){
          scannedRef.current = true;
          handleQRPayload(code.data);
          return;
        }
      }catch(e){}
      rafRef.current = requestAnimationFrame(tick);
    };

    startCamera();
    return ()=>{
      cancelled = true;
      if(rafRef.current) cancelAnimationFrame(rafRef.current);
      if(streamRef.current){ streamRef.current.getTracks().forEach(t=>t.stop()); streamRef.current = null; }
    };
  // eslint-disable-next-line
  },[]);

  const handleQRPayload = async(data)=>{
    setStatus("processing");
    let eid="", token="";
    try{
      // 형식 1: URL 형식 (?eid=...&token=...)
      if(data.startsWith("http")){
        const u = new URL(data);
        eid = u.searchParams.get("eid") || "";
        token = u.searchParams.get("token") || "";
      }else{
        // 형식 2: JSON
        try{
          const j = JSON.parse(data);
          eid = j.eid || ""; token = j.token || "";
        }catch(e){
          // 형식 3: eid:xxx|token:yyy
          const m1 = data.match(/eid[:=]([^|&\s]+)/);
          const m2 = data.match(/token[:=]([^|&\s]+)/);
          if(m1) eid = m1[1];
          if(m2) token = m2[1];
        }
      }
    }catch(e){}
    if(!eid || !token){
      setStatus("fail");
      setErrMsg("유효하지 않은 QR이에요");
      return;
    }
    const r = await apiCall({action:"verifyQR",name:me,eid,token});
    if(r.ok){
      fireConfetti();
      setResult(r);
      setStatus("success");
      onSuccess && onSuccess(r.newTemp);
    }else{
      setStatus("fail");
      setErrMsg(r.error || "인식에 실패했어요");
      setResult(r);
    }
  };

  const retry=()=>{
    scannedRef.current = false;
    setStatus("scanning");
    setErrMsg(""); setResult(null);
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    const tick = ()=>{
      if(scannedRef.current) return;
      const v = videoRef.current; const c = canvasRef.current;
      if(!v || !c || v.readyState !== 4 || !window.jsQR){
        rafRef.current = requestAnimationFrame(tick); return;
      }
      c.width = v.videoWidth; c.height = v.videoHeight;
      const ctx = c.getContext("2d");
      ctx.drawImage(v,0,0,c.width,c.height);
      try{
        const imageData = ctx.getImageData(0,0,c.width,c.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts:"dontInvert" });
        if(code && code.data){ scannedRef.current = true; handleQRPayload(code.data); return; }
      }catch(e){}
      rafRef.current = requestAnimationFrame(tick);
    };
    tick();
  };

  return(
    <div className="fixed inset-0 z-[80] flex items-end sm:items-center justify-center sm:p-4 fadeIn glass-overlay">
      <div className="glass w-full max-w-md rounded-t-[28px] sm:rounded-[28px] max-h-[92vh] overflow-hidden flex flex-col">
        <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:"1px solid rgba(15,23,42,0.06)"}}>
          <div className="flex items-center gap-2.5">
            <span className="text-lg">📷</span>
            <h2 className="font-extrabold text-slate-900 track-tight">행사 QR 스캔</h2>
          </div>
          <button onClick={onClose} className="w-9 h-9 rounded-full hover:bg-slate-100/80 flex items-center justify-center text-slate-400 btn">
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <div className="p-5" style={{background:"rgba(255,255,255,0.6)"}}>
          {status==="scanning" && (
            <>
              {camErr ? (
                <div className="rounded-2xl p-6 text-center" style={{background:"#FEF2F2",border:"1px solid #FECACA"}}>
                  <div className="text-3xl mb-2">📵</div>
                  <p className="text-sm font-extrabold text-rose-700 track-tight">{camErr}</p>
                </div>
              ) : (
                <div className="qr-scanner-wrap">
                  <video ref={videoRef} playsInline muted/>
                  <canvas ref={canvasRef} style={{display:"none"}}/>
                  <div className="qr-scan-overlay"/>
                  <div className="qr-scan-frame">
                    <div className="qr-scan-line"/>
                  </div>
                </div>
              )}
              <p className="text-center mt-4 text-sm font-bold text-slate-600 track-tight">
                행사장의 QR을 사각형 안에 맞춰주세요
              </p>
              <p className="text-center mt-1 text-[11px] text-slate-400 font-medium">
                QR로 오르는 온도는 1일 3°C 캡과 별도예요 (하루 +1°C)
              </p>
            </>
          )}

          {status==="processing" && (
            <div className="py-12 text-center">
              <div className="sp sp-g mx-auto mb-4" style={{width:44,height:44,borderWidth:3.5}}/>
              <p className="text-base font-extrabold text-slate-800 track-tight">QR 확인 중이에요</p>
            </div>
          )}

          {status==="success" && result && (
            <div className="py-6 text-center popIn">
              <div className="w-16 h-16 mx-auto mb-3 rounded-full flex items-center justify-center pulseRing"
                   style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)"}}>
                <svg width="32" height="32" fill="none" stroke="#047857" strokeWidth="3.2" viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>
              </div>
              <h3 className="logo-font text-2xl text-slate-900 mb-2 track-tighter">참여 완료!</h3>
              <div className="rounded-2xl p-4 mb-3 mx-2"
                   style={{background:"linear-gradient(180deg,#ECFDF5,#F0FDF4)",border:"1px solid rgba(16,185,129,0.2)"}}>
                <p className="text-xs font-extrabold text-emerald-700 mb-1 tracking-widest uppercase">참여한 행사</p>
                <p className="font-extrabold text-emerald-900 text-base track-tight">{result.eventName}</p>
              </div>
              <div className="inline-flex items-center gap-1.5 text-white text-sm font-extrabold px-4 py-2 rounded-full track-tight"
                   style={{background:"linear-gradient(135deg,#047857,#10B981)",boxShadow:"0 4px 14px rgba(16,185,129,0.32)"}}>
                <span>▲</span>
                <span className="tabular">+1.0°C 따뜻해졌어요</span>
              </div>
              <p className="text-xs text-slate-500 mt-3 font-semibold tabular">
                {result.oldTemp.toFixed(1)}°C → {result.newTemp.toFixed(1)}°C
              </p>

              {result.milestone>0 && (
                <div className="milestone-card">
                  <span className="milestone-icon">{result.milestone===100?"🎁":"☕"}</span>
                  <p className="font-extrabold text-amber-900 text-base mt-2 track-tight">🎉 축하드립니다!</p>
                  <p className="text-sm font-bold text-amber-800 mt-0.5 track-tight">{result.milestone}°C 보상에 도달하셨어요</p>
                  <p className="text-[12px] font-medium text-amber-700 mt-2 leading-relaxed">
                    밀알디아코니아연구소에서<br/>
                    선물을 지급할 예정이오니<br/>
                    교육문화팀에 신청 부탁드립니다.
                  </p>
                </div>
              )}

              <button onClick={onClose} className="mt-5 px-6 py-3 rounded-2xl btn btn-g text-sm track-tight">
                확인
              </button>
            </div>
          )}

          {status==="fail" && (
            <div className="py-8 text-center popIn">
              <div className="text-5xl mb-3">
                {result && result.status==="expired" ? "⏰" :
                 result && result.status==="already_joined" ? "💚" :
                 result && result.status==="daily_qr_used" ? "🌡️" : "❌"}
              </div>
              <p className="text-base font-extrabold text-slate-800 track-tight mb-2">{errMsg}</p>
              {result && result.eventName && (
                <p className="text-sm font-semibold text-slate-500 track-tight">행사: {result.eventName}</p>
              )}
              <div className="flex gap-2 justify-center mt-5">
                <button onClick={retry} className="px-5 py-3 rounded-2xl text-sm font-bold track-tight"
                        style={{background:"#F8FAFC",border:"1px solid var(--line)",color:"#475569"}}>
                  다시 스캔
                </button>
                <button onClick={onClose} className="px-5 py-3 rounded-2xl btn btn-g text-sm track-tight">
                  닫기
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AdminMode({me,onClose}){
  const [tab,setTab]=useState("stats");
  const [stats,setStats]=useState(null);
  const [staffList,setStaffList]=useState([]);
  const [qrList,setQrList]=useState([]);
  const [notice,setNotice]=useState({active:false,content:""});
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState("");

  useEffect(()=>{document.body.classList.add("modal-open");return()=>document.body.classList.remove("modal-open");},[]);

  const showToast=(msg)=>{ setToast(msg); setTimeout(()=>setToast(""),2000); };

  const loadAll = useCallback(async()=>{
    setLoading(true);
    const [s,a,q,n] = await Promise.all([
      apiCall({action:"adminGetStats",name:me}),
      apiCall({action:"adminGetAllStaff",name:me}),
      apiCall({action:"adminGetQRList",name:me}),
      apiCall({action:"getNotice"})
    ]);
    if(s.ok) setStats(s);
    if(a.ok) setStaffList(a.staff);
    if(q.ok) setQrList(q.qrs);
    if(n.ok) setNotice({active:n.active,content:n.content});
    setLoading(false);
  },[me]);

  useEffect(()=>{loadAll();},[loadAll]);

  return(
    <div className="fixed inset-0 z-[88] fadeIn" style={{background:"#F9FAFB"}}>
      <div className="max-w-md mx-auto px-4 pt-5 pb-6 min-h-screen">
        <div className="flex items-center justify-between mb-4 slideUp">
          <div className="flex items-center gap-2.5">
            <span className="text-2xl">⚙️</span>
            <div>
              <h1 className="logo-font text-[22px] leading-none track-tighter" style={{background:"linear-gradient(135deg,#064E3B,#10B981)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>관리자 모드</h1>
              <p className="text-[10px] font-extrabold text-slate-400 tracking-widest mt-0.5">감사해U</p>
            </div>
          </div>
          <button onClick={onClose} className="text-xs font-bold text-slate-600 px-3.5 py-2 rounded-full bg-white btn track-tight"
                  style={{border:"1px solid var(--line)"}}>← 돌아가기</button>
        </div>

        <div className="card p-2 mb-3 slideUp" style={{animationDelay:"0.04s"}}>
          <div className="flex gap-1">
            <button onClick={()=>setTab("stats")} className={`admin-tab ${tab==="stats"?"active":""}`}>📊 통계</button>
            <button onClick={()=>setTab("staff")} className={`admin-tab ${tab==="staff"?"active":""}`}>👥 직원</button>
            <button onClick={()=>setTab("qr")} className={`admin-tab ${tab==="qr"?"active":""}`}>📷 QR</button>
            <button onClick={()=>setTab("notice")} className={`admin-tab ${tab==="notice"?"active":""}`}>📢 공지</button>
            <button onClick={()=>setTab("ops")} className={`admin-tab ${tab==="ops"?"active":""}`}>🛠️ 운영</button>
          </div>
        </div>

        {loading && (
          <div className="py-20 text-center">
            <div className="sp sp-g mx-auto mb-3" style={{width:36,height:36,borderWidth:3}}/>
            <p className="text-sm font-bold text-slate-500">불러오는 중...</p>
          </div>
        )}

        {!loading && tab==="stats" && stats && (
          <div className="space-y-3 slideUp">
            <div className="grid grid-cols-2 gap-2.5">
              <div className="admin-stat-card">
                <p className="text-[10px] font-extrabold text-emerald-700 tracking-widest uppercase mb-1">전체 직원</p>
                <p className="fw900 tabular text-2xl text-emerald-900">{stats.totalActive}</p>
                <p className="text-[10px] font-medium text-emerald-700 mt-0.5">참여 {stats.activeUsers}명</p>
              </div>
              <div className="admin-stat-card">
                <p className="text-[10px] font-extrabold text-emerald-700 tracking-widest uppercase mb-1">누적 쪽지</p>
                <p className="fw900 tabular text-2xl text-emerald-900">{stats.totalAll}</p>
                <p className="text-[10px] font-medium text-emerald-700 mt-0.5">통</p>
              </div>
            </div>

            <div className="admin-card">
              <p className="text-[11px] font-extrabold text-slate-700 tracking-widest uppercase mb-3">온도 분포</p>
              <div className="space-y-1.5">
                {[

                  {label:"80°C ~ 99.9°C ☕",val:stats.tempBuckets.c80,col:"#34D399"},
                  {label:"60°C ~ 79.9°C ☕",val:stats.tempBuckets.c60,col:"#6EE7B7"},

                        <div className="h-full rounded-full" style={{width:`${pct}%`,background:r.col,transition:"width 0.6s"}}/>
                      </div>
                      <div className="text-xs font-extrabold tabular text-slate-700 w-10 text-right">{r.val}명</div>
                    </div>

                })}

            {stats.topSenders && stats.topSenders.length>0 && (

                <div className="space-y-2">
                  {stats.topSenders.map((s,i)=>{
                    const ps=parseS(s.full);
                    return(
                      <div key={s.full} className="flex items-center gap-2.5">
                        <div className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-extrabold flex-shrink-0"

                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-extrabold text-slate-800 truncate track-tight">{ps.name} <span className="text-xs font-medium text-slate-400">{ps.role}</span></p>
                          <p className="text-[11px] text-slate-400 truncate">{ps.dept}</p>
                        </div>
                        <div className="text-sm font-extrabold tabular text-emerald-700">{s.count}통</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {stats.topReceivers && stats.topReceivers.length>0 && (
              <div className="admin-card">
                <p className="text-[11px] font-extrabold text-slate-700 tracking-widest uppercase mb-3">💚 감사를 많이 받은 분 TOP 5</p>
                <div className="space-y-2">
                  {stats.topReceivers.map((s,i)=>{
                    const ps=parseS(s.full);
                    return(
                      <div key={s.full} className="flex items-center gap-2.5">
                        <div className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-extrabold flex-shrink-0"
                             style={{background:i===0?"#FCD34D":i===1?"#E2E8F0":i===2?"#FED7AA":"#F1F5F9",color:i<3?"#78350F":"#64748B"}}>{i+1}</div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm font-extrabold text-slate-800 truncate track-tight">{ps.name} <span className="text-xs font-medium text-slate-400">{ps.role}</span></p>
                          <p className="text-[11px] text-slate-400 truncate">{ps.dept}</p>
                        </div>
                        <div className="text-sm font-extrabold tabular text-emerald-700">{s.count}통</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {stats.daily && stats.daily.length>0 && (
              <div className="admin-card">
                <p className="text-[11px] font-extrabold text-slate-700 tracking-widest uppercase mb-3">📅 최근 30일 일별 추이</p>
                <div className="flex items-end gap-0.5" style={{height:"80px"}}>
                  {stats.daily.map(d=>{
                    const max = Math.max(...stats.daily.map(x=>x.count),1);
                    const h = (d.count/max)*100;
                    return(
                      <div key={d.date} className="flex-1 rounded-t" style={{height:`${Math.max(h,3)}%`,background:"linear-gradient(to top,#10B981,#34D399)",minHeight:"2px"}} title={`${d.date}: ${d.count}통`}/>
                    );
                  })}
                </div>
                <p className="text-[10px] text-slate-400 mt-2 text-center font-medium">최대 {Math.max(...stats.daily.map(x=>x.count),0)}통/일</p>
              </div>
            )}
          </div>
        )}

        {!loading && tab==="staff" && (
          <AdminStaffTab staffList={staffList} me={me} reload={loadAll} showToast={showToast}/>
        )}

        {!loading && tab==="qr" && (
          <AdminQRTab qrList={qrList} me={me} reload={loadAll} showToast={showToast}/>
        )}

        {!loading && tab==="notice" && (
          <AdminNoticeTab notice={notice} me={me} reload={loadAll} showToast={showToast}/>
        )}

        {!loading && tab==="ops" && (
          <AdminOpsTab me={me} reload={loadAll} showToast={showToast}/>
        )}

        {toast && (
          <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-2xl text-white font-extrabold text-sm popIn track-tight"
